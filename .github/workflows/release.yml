name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-dylib:
    name: Build and publish dylib
    # Requires macOS 26 (Tahoe) with Xcode 26 for FoundationModels framework.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Foundation Models dylib
        run: make build-native

      - name: Upload dylib to release
        uses: softprops/action-gh-release@v2
        with:
          files: lib/libFoundationModels.dylib
          fail_on_unmatched_files: true
