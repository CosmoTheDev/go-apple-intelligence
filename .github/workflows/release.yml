name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-dylib:
    name: Build and publish dylib
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Foundation Models dylib
        run: make build-native

      - name: Strip debug symbols and build paths from dylib
        run: strip -x lib/libFoundationModels.dylib

      - name: Upload dylib to release
        uses: softprops/action-gh-release@v2
        with:
          files: lib/libFoundationModels.dylib
          fail_on_unmatched_files: true
