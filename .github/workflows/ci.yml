name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vet:
    name: Go vet
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download pre-built dylib
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p lib
          gh release download --pattern "libFoundationModels.dylib" --dir lib \
            --repo "${{ github.repository }}" 2>/dev/null || \
            echo "No dylib release found — skipping full vet."

      - name: go vet (with dylib)
        if: hashFiles('lib/libFoundationModels.dylib') != ''
        run: CGO_ENABLED=1 go vet ./...

      - name: go vet (no dylib yet — syntax only)
        if: hashFiles('lib/libFoundationModels.dylib') == ''
        run: CGO_ENABLED=0 go vet $(go list ./... | grep -v github.com/CosmoTheDev/go-apple-intelligence/fm) 2>/dev/null || true
